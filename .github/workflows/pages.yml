name: Deploy to GitHub Pages

# Publishes the explorable essay (index.html + app.js + data/ snapshots) to
# GitHub Pages. No build step — the site is vanilla HTML/ES-module/JSON and is
# deployed as-is from the repo root.
#
# One-time setup by the repo owner: Settings → Pages → Build and deployment →
# Source = "GitHub Actions". After that, every push to main publishes.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Deploy the whole repo root; index.html is the entry point.
          path: .
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
